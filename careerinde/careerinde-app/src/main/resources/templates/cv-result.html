<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>CV Analysis Result</title>

    <style>

        body {

            font-family: Arial, sans-serif;

            background: #f5f5f5;

            padding: 40px;
        }

        .container {

            max-width: 1000px;

            margin: auto;
        }

        .card {

            background: white;

            padding: 35px;

            border-radius: 16px;

            margin-bottom: 25px;

            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        h1, h2 {

            margin-bottom: 20px;
        }

        .score {

            font-size: 64px;

            font-weight: bold;

            color: black;
        }

        ul {

            padding-left: 20px;
        }

        li {

            margin-bottom: 10px;

            line-height: 1.7;
        }

        .text-box {

            background: #fafafa;

            border: 1px solid #e5e5e5;

            border-radius: 12px;

            padding: 25px;

            white-space: pre-wrap;

            line-height: 1.7;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>
            ATS Score 🚀
        </h1>

        <div class="score"
             th:text="${atsScore} + '%'">
        </div>

    </div>

    <div class="card">

        <h2>
            Detected Skills
        </h2>

        <ul>

            <li th:each="skill : ${skills}"
                th:text="${skill}">
            </li>

        </ul>

    </div>

    <div class="card">

        <h2>
            Missing Skills
        </h2>

        <ul>

            <li th:each="skill : ${missingSkills}"
                th:text="${skill}">
            </li>

        </ul>

    </div>

    <div class="card">

        <h2>
            AI Recommendations 🤖
        </h2>

        <ul>

            <li th:each="suggestion : ${suggestions}"
                th:text="${suggestion}">
            </li>

        </ul>

    </div>

    <div class="card">

        <h2>
            Extracted CV Text
        </h2>
		
		<div class="card">

		    <h2>
		        OpenAI Career Analysis 🤖
		    </h2>

		    <div class="text-box"
		         th:text="${aiResponse}">
		    </div>
			
		</div>

        <div class="text-box"
             th:text="${cvText}">
        </div>

    </div>

</div>

</body>

</html>
