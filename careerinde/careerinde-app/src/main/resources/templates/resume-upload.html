<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Upload CV</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            background: #f5f5f5;

            height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 20px;
        }

        .upload-container {

            width: 550px;

            background: white;

            border-radius: 18px;

            padding: 50px;

            box-shadow: 0 4px 25px rgba(0,0,0,0.08);
        }

        .title {

            font-size: 32px;

            font-weight: bold;

            margin-bottom: 10px;

            color: #111;
        }

        .subtitle {

            color: #666;

            margin-bottom: 40px;

            line-height: 1.6;
        }

        .upload-box {

            border: 2px dashed #dcdcdc;

            border-radius: 14px;

            padding: 50px 30px;

            text-align: center;

            margin-bottom: 30px;

            transition: 0.2s;
        }

        .upload-box:hover {

            border-color: black;
        }

        .upload-icon {

            font-size: 50px;

            margin-bottom: 20px;
        }

        .upload-text {

            font-size: 16px;

            font-weight: bold;

            margin-bottom: 10px;
        }

        .upload-subtext {

            color: #777;

            font-size: 14px;

            margin-bottom: 25px;
        }

        input[type="file"] {

            font-size: 14px;
        }

        .upload-btn {

            width: 100%;

            padding: 16px;

            border: none;

            border-radius: 12px;

            background: black;

            color: white;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.2s;
        }

        .upload-btn:hover {

            opacity: 0.9;
        }

        .info {

            margin-top: 25px;

            color: #777;

            font-size: 13px;

            line-height: 1.6;
        }

    </style>

</head>

<body>

<div class="upload-container">

    <div class="title">
        Upload Your CV 📄
    </div>

    <div class="subtitle">
        Upload your German-style CV and let Careerinde analyze
        your profile for the German job market.
    </div>

    <form th:action="@{/resume/upload}"
          method="post"
          enctype="multipart/form-data">

        <div class="upload-box">

            <div class="upload-icon">
                📁
            </div>

            <div class="upload-text">
                Select your CV file
            </div>

            <div class="upload-subtext">
                PDF files only
            </div>

            <input type="file"
                   name="file"
                   accept=".pdf"
                   required>

        </div>

        <button class="upload-btn" type="submit">
            Upload CV
        </button>

    </form>

    <div class="info">

        Your CV will be securely processed for:
        <br><br>

        • ATS Score Analysis  
        • German CV Optimization  
        • Skill Gap Detection  
        • AI Job Matching

    </div>

</div>

</body>

</html>
